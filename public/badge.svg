<svg xmlns="http://www.w3.org/2000/svg" width="160" height="40" viewBox="0 0 160 40" role="img" aria-label="FreeQR — Free QR Code Generator">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="160" height="40" rx="8" fill="url(#bg)"/>
  <!-- QR icon -->
  <rect x="8" y="8" width="6" height="6" rx="1" fill="white"/>
  <rect x="16" y="8" width="6" height="6" rx="1" fill="white"/>
  <rect x="8" y="16" width="6" height="6" rx="1" fill="white"/>
  <rect x="16" y="16" width="2" height="2" rx="0.5" fill="white"/>
  <rect x="20" y="16" width="2" height="6" rx="0.5" fill="white"/>
  <rect x="16" y="20" width="4" height="2" rx="0.5" fill="white"/>
  <!-- Text -->
  <text x="32" y="16" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="white">FreeQR</text>
  <text x="32" y="28" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" fill="rgba(255,255,255,0.8)">Free QR Code Generator</text>
</svg>
