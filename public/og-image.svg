  <!-- Download CTA button -->
  <rect x="780" y="500" width="320" height="56" rx="28" fill="url(#accent)"/>
  <text x="940" y="534" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="white">Generate Free QR →</text>
