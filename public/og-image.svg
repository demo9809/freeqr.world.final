  <text x="520" y="444" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Barcode</text>

  <rect x="592" y="422" width="130" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="657" y="444" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">+ Logo</text>

  <rect x="734" y="422" width="170" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="819" y="444" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">PNG · SVG · PDF</text>

  <rect x="916" y="422" width="152" height="34" rx="17" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-opacity="0.5" stroke-width="1"/>
  <text x="992" y="444" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#818cf8">15+ types</text>

  <!-- Domain badge -->
