    <rect x="124" y="212" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="156" y="212" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="124" y="228" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="140" y="228" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="124" y="244" width="12" height="12" rx="2" fill="#7c3aed"/>
