    <!-- QR icon in center -->
    <text x="150" y="158" text-anchor="middle" font-size="36" fill="white" font-family="monospace">⬡</text>

    <!-- Data dots -->
    <rect x="124" y="24" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="140" y="24" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="156" y="24" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="124" y="40" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="156" y="40" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="140" y="56" width="12" height="12" rx="2" fill="#7c3aed"/>

    <rect x="24" y="124" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="40" y="124" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="56" y="124" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="24" y="140" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="56" y="140" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="40" y="156" width="12" height="12" rx="2" fill="#7c3aed"/>

    <rect x="196" y="124" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="212" y="124" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="228" y="124" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="260" y="124" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="196" y="140" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="244" y="140" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="196" y="156" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="212" y="156" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="260" y="156" width="12" height="12" rx="2" fill="#7c3aed"/>

    <rect x="196" y="196" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="212" y="196" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="244" y="196" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="260" y="196" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="196" y="212" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="228" y="212" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="244" y="212" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="196" y="228" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="260" y="228" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="196" y="244" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="212" y="244" width="12" height="12" rx="2" fill="#7c3aed"/>
    <rect x="228" y="244" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="260" y="244" width="12" height="12" rx="2" fill="#7c3aed"/>

    <rect x="124" y="196" width="12" height="12" rx="2" fill="#4f46e5"/>
    <rect x="140" y="196" width="12" height="12" rx="2" fill="#7c3aed"/>
