    <!-- Outer container -->
    <rect width="300" height="300" rx="24" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>

    <!-- Top-left finder -->
    <rect x="24" y="24" width="80" height="80" rx="10" fill="#4f46e5"/>
    <rect x="36" y="36" width="56" height="56" rx="6" fill="#1e293b"/>
    <rect x="48" y="48" width="32" height="32" rx="3" fill="#4f46e5"/>

    <!-- Top-right finder -->
    <rect x="196" y="24" width="80" height="80" rx="10" fill="#4f46e5"/>
    <rect x="208" y="36" width="56" height="56" rx="6" fill="#1e293b"/>
    <rect x="220" y="48" width="32" height="32" rx="3" fill="#4f46e5"/>

    <!-- Bottom-left finder -->
    <rect x="24" y="196" width="80" height="80" rx="10" fill="#4f46e5"/>
    <rect x="36" y="208" width="56" height="56" rx="6" fill="#1e293b"/>
    <rect x="48" y="220" width="32" height="32" rx="3" fill="#4f46e5"/>

    <!-- Center logo background -->
