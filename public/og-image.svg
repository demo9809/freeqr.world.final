  <text x="510" y="397" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">URL</text>

  <rect x="572" y="375" width="100" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="622" y="397" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">WiFi</text>

  <rect x="684" y="375" width="120" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="744" y="397" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">vCard</text>

  <rect x="816" y="375" width="140" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="886" y="397" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">WhatsApp</text>

  <rect x="968" y="375" width="100" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1018" y="397" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">UPI</text>

  <!-- Feature pills row 2 -->
