<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Barcode — FreeQR</title>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f1f5f9 0%, #e9edf5 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 28px;
      padding: 36px 28px 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .header-icon {
      width: 40px; height: 40px;
      background: #0f172a;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-icon svg { display: block; }
    .header-title { font-size: 16px; font-weight: 700; color: #0f172a; }
    .barcode-box {
      background: #fff;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      padding: 20px 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #barcode { max-width: 100%; height: auto; }
    .badges {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 14px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      word-break: break-all;
      max-width: 280px;
    }
    .badge.format { background: #eef2ff; border-color: #c7d2fe; color: #4338ca; max-width: 120px; }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #94a3b8;
    }
    .footer a { color: #4f46e5; text-decoration: none; font-weight: 600; }
    /* Error state */
    .error { padding: 16px 0; }
    .error-emoji { font-size: 40px; margin-bottom: 12px; }
    .error-title { font-size: 18px; font-weight: 700; color: #ef4444; margin-bottom: 6px; }
    .error-msg { font-size: 13px; color: #94a3b8; line-height: 1.6; }
    @media (max-width: 380px) {
      .card { padding: 28px 16px 22px; border-radius: 20px; }
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="header">
      <div class="header-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 5a2 2 0 0 1 2-2h1a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <path d="M10 5a2 2 0 0 1 2-2h1a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2z"/>
          <path d="M17 9a2 2 0 0 1 2-2h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2z"/>
        </svg>
      </div>
      <span class="header-title">Barcode Viewer</span>
    </div>

    <div class="barcode-box">
      <svg id="barcode"></svg>
    </div>

    <div class="badges">
      <span class="badge format" id="format-badge">CODE128</span>
      <span class="badge" id="data-badge"></span>
    </div>

    <div class="footer">
      Generated by <a href="https://freeqr.world" target="_blank">FreeQR.world</a>
    </div>
  </div>

  <script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var d = params.get('d');
    var f = params.get('f') || 'CODE128';

    var card = document.getElementById('card');

    if (!d) {
      card.innerHTML = '<div class="error"><div class="error-emoji">⚠️</div><div class="error-title">No Barcode Data</div><div class="error-msg">This QR code is missing barcode data.<br>Please regenerate it in FreeQR Studio.</div></div><div class="footer" style="margin-top:24px">Powered by <a href="https://freeqr.world">FreeQR.world</a></div>';
      return;
    }

    var data;
    try { data = atob(d); } catch (e) { data = decodeURIComponent(d); }

    document.getElementById('format-badge').textContent = f;
    document.getElementById('data-badge').textContent = data;

    try {
      JsBarcode('#barcode', data, {
        format: f,
        width: 2.5,
        height: 100,
        displayValue: true,
        fontSize: 15,
        margin: 12,
        background: '#ffffff',
        lineColor: '#0f172a',
        textMargin: 8,
      });
    } catch (err) {
      card.innerHTML =
        '<div class="error"><div class="error-emoji">❌</div>' +
        '<div class="error-title">Invalid Barcode</div>' +
        '<div class="error-msg">Could not render <strong>' + f + '</strong> barcode.<br><br>' + err.message + '</div></div>' +
        '<div class="footer" style="margin-top:24px">Powered by <a href="https://freeqr.world">FreeQR.world</a></div>';
    }
  })();
  </script>
</body>
</html>
